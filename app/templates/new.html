<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新規登録 - AIログノート</title>
  <style>
    /* 共通スタイルが3画面に重複してきた。次に画面を追加する際は
       base.html への継承(extends)を検討する */
    * {
      box-sizing: border-box;
      margin: 0;
    }
    body {
      font-family: sans-serif;
      background: #f5f5f0;
      color: #333;
      max-width: 640px;
      margin: 0 auto;
      padding: 16px;
      line-height: 1.6;
    }
    .back {
      display: inline-block;
      padding: 10px 0;
      color: #2b6777;
    }
    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px;
    }
    h1 {
      font-size: 1.2rem;
    }
    /* エラーメッセージ: フォームの上にまとめて表示する */
    .errors {
      background: #fdecea;
      border: 1px solid #e57373;
      color: #b71c1c;
      border-radius: 8px;
      padding: 10px 14px 10px 30px;
      margin-bottom: 12px;
      font-size: 0.9rem;
    }
    /* 縦並びフォーム: ラベルの下に入力欄を全幅で置く(スマホ前提) */
    .field {
      margin-top: 16px;
    }
    label {
      display: block;
      font-size: 0.8rem;
      color: #777;
      margin-bottom: 4px;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
      font-family: inherit;
      background: #fff;
    }
    textarea {
      min-height: 120px;
      resize: vertical;
    }
    .submit {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: #2b6777;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <a class="back" href="/">&larr; 一覧へ戻る</a>

  {% if errors %}
    <ul class="errors">
      {% for error in errors %}
        <li>{{ error }}</li>
      {% endfor %}
    </ul>
  {% endif %}

  <div class="card">
    <h1>新規登録</h1>
    <!-- JavaScript不使用: 通常のフォーム送信(POST)で登録する。
         required / maxlength はブラウザ側の入力補助で、
         検証の本体はサーバ側(LogCreate)が行う -->
    <form method="post" action="/logs/new">
      <div class="field">
        <label for="title">タイトル(必須)</label>
        <input type="text" id="title" name="title" value="{{ values.title }}"
               maxlength="200" required>
      </div>

      <div class="field">
        <label for="ai_type">AI種別(必須)</label>
        <select id="ai_type" name="ai_type" required>
          <option value="" disabled {% if not values.ai_type %}selected{% endif %}>選択してください</option>
          {% for ai_type in ai_types %}
            <option value="{{ ai_type }}" {% if values.ai_type == ai_type %}selected{% endif %}>{{ ai_type }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="field">
        <label for="tags">タグ(カンマ区切り・省略可)</label>
        <input type="text" id="tags" name="tags" value="{{ values.tags }}"
               maxlength="500">
      </div>

      <div class="field">
        <label for="note">メモ(省略可)</label>
        <textarea id="note" name="note" maxlength="10000">{{ values.note }}</textarea>
      </div>

      <div class="field">
        <label for="next_action">次回作業メモ(省略可・次にやることの引き継ぎ用)</label>
        <textarea id="next_action" name="next_action" maxlength="5000">{{ values.next_action }}</textarea>
      </div>

      <button class="submit" type="submit">登録する</button>
    </form>
  </div>
</body>
</html>
